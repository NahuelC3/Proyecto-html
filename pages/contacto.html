<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Nahuel Carbajal</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="body-site">

    <header class="header-site">
        <div class="logo-container">
            <img src="../images/logo.png" alt="Logo de Nahuel Carbajal" class="logo-img" width="40">
            <strong class="logo">Nahuel Carbajal</strong>
        </div>
        <nav>
            <ul class="nav-list">
                <li><a class="nav-link" href="../index.html">Inicio</a></li>
                <li><a class="nav-link" href="sobre-mi.html">Sobre mí</a></li>
                <li><a class="nav-link" href="proyectos.html">Proyectos</a></li>
                <li><a class="nav-link" href="servicios.html">Servicios</a></li>
                <li><a class="nav-link active" href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <section class="section-card">
            <article class="contact-article">
                <h1 class="main-title">Ponete en contacto</h1>
                <p class="text-p">Si tenés alguna duda, propuesta laboral o querés que colaboremos en un proyecto, completa el formulario de abajo.</p>
                
                <form action="#" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="name">Nombre:</label>
                        <input type="text" id="name" name="name" required placeholder="Tu nombre completo">
                    </div>
                    <div class="form-group">
                        <label for="email">Correo Electrónico:</label>
                        <input type="email" id="email" name="email" required placeholder="tu@correo.com">
                    </div>
                    <div class="form-group">
                        <label for="message">Mensaje:</label>
                        <textarea id="message" name="message" rows="5" required placeholder="Escribí tu mensaje acá..."></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Enviar Mensaje</button>
                </form>
            </article>
        </section>
    </main>

    <footer class="footer-site">
        <p>&copy; 2026 Nahuel Carbajal. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
