    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="body-site">

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid max-width-container">
            <a class="navbar-brand" href="../index.html">
                <img src="../images/logo.png" alt="Logo Nahuel Carbajal" width="35" height="35" class="d-inline-block align-text-top">
                Nahuel Carbajal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="sobre-mi.html">Sobre mí</a></li>
                    <li class="nav-item"><a class="nav-link" href="proyectos.html">Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section class="section-card">
            <h1 class="main-title mb-3">Contacto</h1>
            <p class="text-p mb-4">Si querés ponerte en contacto conmigo para algún proyecto, propuesta laboral o consulta, podés completarme este formulario:</p>

            <form action="#" method="POST" class="needs-validation">
                <div class="mb-3">
                    <label for="nombre" class="form-label font-weight-bold">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ej: Juan Pérez" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label font-weight-bold">Correo electrónico:</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="mb-3">
                    <label for="asunto" class="form-label font-weight-bold">Asunto:</label>
                    <input type="text" id="asunto" name="asunto" class="form-control" placeholder="Consulta o propuesta" required>
                </div>

                <div class="mb-3">
                    <label for="mensaje" class="form-label font-weight-bold">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="5" class="form-control" placeholder="Escribí tu mensaje acá..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary px-4 py-2">Enviar mensaje</button>
            </form>
        </section>
    </main>

    <footer class="footer-site">
        <p class="m-0">&copy; 2026 Nahuel Carbajal. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
